<style>
:root{
  --bg:#faf7f2; --panel:#ffffff; --ink:#2b2620; --muted:#8a8177;
  --accent:#c0392b; --accent2:#1a7a6d; --line:#e8e1d6;
  --chip:#f3ede3;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;color:var(--ink);background:var(--bg)}
body{display:flex;flex-direction:column;overflow:hidden}
.topnav{
  position:relative;
  z-index:1200;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  min-height:58px;
  padding:9px clamp(14px, 3vw, 28px);
  background:rgba(250,247,242,.96);
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(12px);
}
.brand{display:flex;flex-direction:column;min-width:0}
.brand strong{font-size:15px;line-height:1.25}
.brand span{color:var(--muted);font-size:12px;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.navlinks{display:flex;align-items:center;gap:8px;flex-shrink:0}
.navlinks a{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:38px;
  padding:0 14px;
  border:1px solid var(--line);
  border-radius:8px;
  color:var(--ink);
  background:var(--panel);
  text-decoration:none;
  font-size:14px;
  font-weight:700;
}
.navlinks a[aria-current="page"]{color:#fff;background:var(--accent);border-color:var(--accent)}
.navlinks a.map[aria-current="page"]{color:#fff;background:var(--accent2);border-color:var(--accent2)}
#app{display:flex;flex:1;min-height:0;height:calc(100vh - 58px);height:calc(100dvh - 58px);overflow:hidden}

/* ---------- sidebar ---------- */
#sidebar{width:400px;min-width:340px;display:flex;flex-direction:column;background:var(--panel);border-right:1px solid var(--line);z-index:1000}
.sheet-handle{display:none}
header{padding:14px 18px 8px;border-bottom:1px solid var(--line)}
header h1{font-size:18px;letter-spacing:.5px}
header p{font-size:12px;color:var(--muted);margin-top:3px}
.city-tabs{display:flex;gap:6px;padding:10px 14px 0;flex-wrap:wrap}
.city-tab{flex:1;min-width:70px;padding:8px 4px;text-align:center;border:1px solid var(--line);border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;background:var(--chip);transition:.15s;white-space:nowrap}
.city-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.filter-toggle{display:flex;align-items:center;justify-content:center;width:calc(100% - 28px);margin:8px 14px 0;padding:7px 10px;border:1px solid var(--line);border-radius:9px;background:var(--chip);color:var(--ink);font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer}
#offlineBtn{display:block;width:calc(100% - 28px);margin:6px 14px 0;padding:8px 10px;border:1px solid #cfe3de;border-radius:9px;background:#eef6f4;color:var(--accent2);font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer}
#offlineBtn:active{transform:scale(.97)}
#offlineBtn:disabled{opacity:.6;cursor:default}
.filters.collapsed{display:none}
.filters{padding:10px 14px;border-bottom:1px solid var(--line)}
.filter-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.chip{padding:5px 10px;border-radius:20px;font-size:12.5px;cursor:pointer;border:1px solid var(--line);background:#fff;user-select:none;transition:.12s}
.chip.on{color:#fff;border-color:transparent}
.chip.halal-chip.on{background:#0e7c3f}
#search{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;outline:none}
#search:focus{border-color:var(--accent)}
#count{font-size:12px;color:var(--muted);padding:8px 18px 4px;transition:opacity .2s}
.filters{transition:opacity .2s}
#list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:4px 12px 20px;transition:opacity .2s;overscroll-behavior:contain}
.trip-controls{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid var(--line);box-shadow:0 3px 8px rgba(0,0,0,.06)}
html,body{overscroll-behavior:none} /* 防止下拉手勢觸發瀏覽器 pull-to-refresh 吃掉觸控 */
.card{border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin:8px 4px;cursor:pointer;background:#fff;transition:.12s}
.card:hover{border-color:var(--accent);box-shadow:0 2px 10px rgba(0,0,0,.06)}
.card .top{display:flex;align-items:center;gap:7px}
.badge{font-size:10.5px;color:#fff;padding:2px 7px;border-radius:9px;white-space:nowrap}
.halal-tag{font-size:10.5px;color:#0e7c3f;border:1px solid #0e7c3f;padding:1px 6px;border-radius:9px;white-space:nowrap}
.card h3{font-size:14.5px;flex:1}
.card .meta{font-size:11.5px;color:var(--muted);margin-top:5px;line-height:1.5}
.card .dishes{font-size:12px;margin-top:5px;color:#5a5248}

/* ---------- map & pins ---------- */
#map{flex:1;height:100%}
/* 效能：box-shadow 取代 filter:drop-shadow——數百個圖釘在手機平移時 filter 每幀重繪會卡 */
.pin{width:30px;height:30px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 4px rgba(0,0,0,.35);transition:transform .12s ease,box-shadow .12s ease}
.pin span{transform:rotate(45deg);font-size:14px;line-height:1}
/* 清單 hover 高亮對應圖釘 */
.pin-wrap.pin-hl{z-index:1200 !important}
.pin-wrap.pin-hl .pin{transform:rotate(-45deg) scale(1.5);box-shadow:0 0 0 4px rgba(26,122,109,.45),0 5px 14px rgba(0,0,0,.5)}
.card.active{border-color:var(--accent2);box-shadow:0 3px 12px rgba(26,122,109,.18)}
.leaflet-popup-content-wrapper{border-radius:12px}
.leaflet-popup-content{margin:14px 16px;min-width:230px;max-width:300px}
.pp h3{font-size:16px;margin-bottom:2px}
.pp .sub{font-size:12px;color:var(--muted);margin-bottom:8px}
.pp .row{font-size:12.5px;line-height:1.65;margin-top:6px}
.pp .row b{color:var(--accent2)}
.pp .warn b{color:#b7791f}
.pp .dish-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.pp .dish-chips span{background:var(--chip);border-radius:8px;padding:2px 8px;font-size:11.5px}

/* 定位 */
.loc-btn{width:34px;height:34px;line-height:32px;text-align:center;font-size:17px;background:#fff;border:2px solid rgba(0,0,0,.2);border-radius:4px;cursor:pointer;user-select:none}
.loc-btn.active{background:#1a7a6d;color:#fff}
.loc-btn.err{background:#c0392b;color:#fff}
.me-dot{width:16px;height:16px;border-radius:50%;background:#1976d2;border:3px solid #fff;box-shadow:0 0 0 2px rgba(25,118,210,.35);position:relative}
.me-dot::after{content:'';position:absolute;inset:-9px;border-radius:50%;border:2px solid rgba(25,118,210,.45);animation:mepulse 1.6s ease-out infinite}
@keyframes mepulse{0%{transform:scale(.5);opacity:1}100%{transform:scale(1.4);opacity:0}}

/* legend */
.legend{position:absolute;bottom:18px;right:12px;z-index:900;background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:12px;padding:8px 12px;font-size:12px;line-height:1.9}

/* ---------- mobile ---------- */
@media (max-width:760px){
  .topnav{min-height:44px;padding:4px 12px}
  .brand strong{font-size:13.5px}
  .brand .trip-date{display:none}
  .brand .site-meta{display:block;font-size:9.5px}
  .navlinks{gap:5px}
  .navlinks a{min-height:32px;padding:0 8px;font-size:12px;border-radius:7px}
  #app{height:calc(100vh - 44px);height:calc(100dvh - 44px);position:relative;display:block}
  /* 地圖固定滿版；面板改覆蓋式＋translateY 位移：拖曳純 GPU 合成、
     地圖尺寸不變，不再需要逐幀 invalidateSize（卡頓主因） */
  #map{position:absolute;inset:0;height:100%}
  #sidebar{position:absolute;left:0;right:0;bottom:0;width:100%;min-width:0;height:88%;
    border-right:none;border-top:1px solid var(--line);border-radius:16px 16px 0 0;z-index:1001;
    box-shadow:0 -4px 16px rgba(0,0,0,.14);flex:none;
    transform:translateY(44%);transition:transform .28s cubic-bezier(.2,.7,.3,1);will-change:transform}
  #sidebar.dragging{transition:none}
  .sheet-handle{display:flex;justify-content:center;align-items:center;padding:9px 0 6px;cursor:grab;touch-action:none;flex-shrink:0}
  .sheet-handle span{width:44px;height:5px;border-radius:3px;background:#ddd4c6}
  header{padding:0 14px 6px}
  header h1{font-size:15.5px}
  header p{font-size:11px}
  .city-tabs{flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .city-tabs::-webkit-scrollbar{display:none}
  .city-tab{padding:8px 10px;font-size:13.5px;flex:0 0 auto;min-width:64px}
  .filter-row{flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:3px}
  .filter-row::-webkit-scrollbar{display:none}
  .chip{padding:7px 12px;font-size:13px;flex:0 0 auto;white-space:nowrap}
  #search{font-size:16px;padding:10px 12px}   /* 避免 iOS 聚焦自動放大 */
  .card{padding:12px 14px}
  .card h3{font-size:15px}
  .legend{display:none}
  .leaflet-popup-content{min-width:190px;max-width:240px}
}
</style>

<script>
// 分類設定：顏色＋圖示
const CATS={
  "景点":{color:"#c0392b",emoji:"🏞",label:"景點"},
  "商圈":{color:"#8e44ad",emoji:"🛍️",label:"商圈"},
  "商场":{color:"#6d28d9",emoji:"🏬",label:"商場"},
  "夜市":{color:"#b45309",emoji:"🌃",label:"夜市"},
  "早餐":{color:"#e67e22",emoji:"🥣",label:"早餐"},
  "甜点":{color:"#d81b60",emoji:"🍰",label:"甜點"},
  "饮料":{color:"#1a7a6d",emoji:"🍵",label:"飲料"},
  "午晚餐":{color:"#2255a4",emoji:"🍲",label:"午晚餐"},
  "住宿":{color:"#37474f",emoji:"🏨",label:"雅高住宿"},
  "交通":{color:"#5d4037",emoji:"🚄",label:"機場高鐵"}
};
const FOOD_CATS=new Set(["早餐","甜点","饮料","午晚餐"]);
const MEAL_CATS=new Set(["早餐","午晚餐"]);
const HALAL_COLOR="#0e7c3f",HALAL_EMOJI="☪";
const CITY_CENTER={"成都":[30.6598,104.0633],"重庆":[29.5630,106.5516]};

// 繁體 → 簡體搜尋轉換
const _T2S=(typeof T2S!=="undefined")?T2S:{};
function t2s(s){let r="";for(const c of s)r+=_T2S[c]||c;return r;}

const map=L.map('map',{zoomControl:true}).setView(CITY_CENTER["成都"],12);
L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',{
  subdomains:['1','2','3','4'],maxZoom:18,attribution:'&copy; 高德地图'
}).addTo(map);

// 建立分類篩選 chips 與圖例
const catChips=document.getElementById('catChips');
Object.entries(CATS).forEach(([k,v])=>{
  const c=document.createElement('span');c.className='chip on';c.dataset.cat=k;
  c.textContent=v.emoji+" "+v.label;
  c.style.background=v.color;c.style.color="#fff";
  c.onclick=()=>{
    c.classList.toggle('on');
    if(c.classList.contains('on')){state.cats.add(k);c.style.background=v.color;c.style.color="#fff";}
    else{state.cats.delete(k);c.style.background="#fff";c.style.color="var(--ink)";}
    rerender();
  };
  catChips.appendChild(c);
});
document.getElementById('legend').innerHTML=
  Object.entries(CATS).filter(([k])=>!MEAL_CATS.has(k)).map(([k,v])=>`<div>${v.emoji} ${v.label}</div>`).join("")+
  `<div>🍽 早餐／午晚餐（非清真）</div><div style="color:${HALAL_COLOR}">${HALAL_EMOJI} 清真／清真友善（餐飲）</div>`;

// 手機覆蓋式面板會遮住地圖下半部：取景與聚焦都要補償露出高度
function _sheetPx(){return (typeof window.sheetVisiblePx==='function')?window.sheetVisiblePx():0;}
function fitPad(){return {paddingTopLeft:[40,40],paddingBottomRight:[40,40+_sheetPx()]};}
function focusOn(latlng,zoom){
  map.setView(latlng,zoom,{animate:false});
  const s=_sheetPx();
  if(s>0)map.panBy([0,Math.round(s/2)],{animate:false}); // 讓目標落在可視區中央
}

let state={city:"成都",cats:new Set(Object.keys(CATS)),halalOnly:false,q:"",tripDay:1,tripShowAll:true};
let markers=[];
let routeLine=null;

function catOf(p){return p.type||p.category;}
function isHalalish(p){return p.halal===true||p.halal==="友善"||p.halal==="true";}
function halalLabel(p){if(p.halal===true||p.halal==="true")return"☪ 清真";if(p.halal==="友善")return"☪ 清真友善";return null;}
// 早餐／午晚餐共用餐廳圖示；甜點與飲料永遠保留自己的圖示，清真狀態另以標籤呈現。
function iconFor(cat,p){
  if(MEAL_CATS.has(cat)&&p&&isHalalish(p))return{emoji:HALAL_EMOJI,color:HALAL_COLOR};
  if(MEAL_CATS.has(cat))return{emoji:"🍽",color:(CATS[cat]||{}).color||"#555"};
  const cfg=CATS[cat]||{color:"#555",emoji:"📌"};
  return{emoji:cfg.emoji,color:cfg.color};
}

function makeIcon(cat,p,dimmed){
  const cfg=iconFor(cat,p);
  return L.divIcon({
    className:'pin-wrap',
    html:`<div class="pin" style="background:${cfg.color};${dimmed?'opacity:.22;transform:rotate(-45deg) scale(.78)':''}"><span>${cfg.emoji}</span></div>`,
    iconSize:[30,30],iconAnchor:[15,30],popupAnchor:[0,-30]
  });
}

function _distKm(a,b){const dx=(a.lat-b.lat)*111,dy=(a.lng-b.lng)*95;return Math.sqrt(dx*dx+dy*dy);}
function nearbyOf(p,n,maxKm){
  n=n||4;maxKm=maxKm||0.45;
  if(!p||!p.lat)return[];
  return PLACES.filter(q=>q.lat&&q.city===p.city&&q.name!==p.name&&!['交通','住宿'].includes(q.type||q.category))
    .map(q=>[_distKm(p,q),q]).filter(pair=>pair[0]<=maxKm)
    .sort((a,b)=>a[0]-b[0]).slice(0,n);
}
function nearbyText(p){
  const nb=nearbyOf(p);
  if(!nb.length)return"";
  return nb.map(pair=>{
    const q=pair[1],m=Math.max(50,Math.round(pair[0]*1000/50)*50);
    const r=q.rating?`⭐${String(q.rating).split('/')[0]}`:"";
    return `${q.name}${r?`（${r}）`:""} ${m}m`;
  }).join("、");
}
// 備選餐廳：手動 alt（店名陣列）優先，否則自動補同類最近清真店；渲染成可點連結。
function autoAltName(stop){
  const p=findPlace(stop.name);if(!p||!p.lat)return null;
  const cat=p.type||p.category;
  const sameCat=FOOD_CATS.has(cat); // 餐飲站找同類；夜市/攤販集合站找最近任意餐飲
  const cand=PLACES.filter(q=>q.lat&&q.city===p.city&&FOOD_CATS.has(q.type||q.category)&&q.name!==p.name&&(!sameCat||(q.type||q.category)===cat))
    .map(q=>({q,d:_distKm(p,q),r:(q.halal===true?0:(q.halal==='友善'?1:2))}))
    .filter(x=>x.d<=1.5).sort((a,b)=>(a.r-b.r)||(a.d-b.d));
  return cand.length?cand[0].q.name:null;
}
function altHTML(stop){
  let names=Array.isArray(stop.alt)?stop.alt.slice():(stop.alt?[stop.alt]:[]);
  let auto=false;
  if(!names.length){const a=autoAltName(stop);if(a){names=[a];auto=true;}}
  if(!names.length)return"";
  const main=findPlace(stop.name);
  const items=names.map(nm=>{
    const q=findPlace(nm);if(!q)return null;
    const d=(main&&main.lat&&q.lat)?_distKm(main,q):null;
    const dist=d!=null?` ${Math.max(50,Math.round(d*1000/50)*50)}m`:'';
    const mk=q.halal===true?'☪ ':'';const fr=q.halal==='友善'?'（友）':'';
    const place=encodeURIComponent(q.name.trim());
    return `<a href="map.html?q=${place}" data-focus-place="${place}" style="color:#a04b12">${mk}${q.name}${fr}</a>${dist}`;
  }).filter(Boolean);
  if(!items.length)return"";
  return `🔁 備選：${items.join('、')}${auto?'（就近同類）':''}`;
}
// 附近用餐（清真優先）：只列 500m 內餐飲；☪→友善→其他排序，最多 4 間。
function nearbyEats(p){
  if(!p||!p.lat)return"";
  const ex=p.name;
  const pick=PLACES.filter(q=>q.lat&&q.city===p.city&&FOOD_CATS.has(q.type||q.category)&&q.name!==ex)
    .map(q=>({q,d:_distKm(p,q),r:(q.halal===true?0:(q.halal==='友善'?1:2))}))
    .filter(x=>x.d<=0.5)
    .sort((a,b)=>(a.r-b.r)||(a.d-b.d))
    .slice(0,4).sort((a,b)=>a.d-b.d);
  if(!pick.length)return"";
  return pick.map(x=>{
    const m=Math.max(50,Math.round(x.d*1000/50)*50);
    return `${x.r===0?'☪ ':''}${x.q.name}${x.r===1?'（友）':''} ${m}m`;
  }).join('、');
}
const NEARBY_CATS=new Set(["景点","商圈","商场","夜市","住宿"]);
function popupHtml(p){
  const dishes=(p.dishes||p.activities||[]).map(d=>`<span>${d}</span>`).join("");
  return `<div class="pp">
    <h3>${p.name}</h3>
    <div class="sub">${p.city}・${p.area||""} ${p.brand?("・"+p.brand):""} ${p.cuisine?("・"+p.cuisine):""} ${halalLabel(p)?("・"+halalLabel(p)):""}</div>
    ${p.rating?`<div class="row"><b>⭐ ${p.rating}</b>${p.rating_source?`（${p.rating_source}）`:""}</div>`:""}
    ${p.hours?`<div class="row"><b>🕐 </b>${p.hours}</div>`:""}
    ${p.price?`<div class="row"><b>💰 </b>${p.price}</div>`:""}
    ${p.ticket?`<div class="row"><b>🎫 門票：</b>${p.ticket}</div>`:""}
    ${p.duration?`<div class="row"><b>⏱ 建議停留：</b>${p.duration}</div>`:""}
    ${dishes?`<div class="row"><b>${p.type||p.category==="交通"?"🎡 推薦項目：":"🍽 推薦菜色："}</b><div class="dish-chips">${dishes}</div></div>`:""}
    ${p.reason?`<div class="row"><b>💡 </b>${p.reason}</div>`:""}
    ${p.notes?`<div class="row warn"><b>⚠️ </b>${p.notes}</div>`:""}
    ${NEARBY_CATS.has(p.type||p.category)&&nearbyText(p)?`<div class="row"><b>🧭 附近知名：</b>${nearbyText(p)}</div>`:""}
    ${p.address?`<div class="row"><b>📍 </b>${p.address}</div>`:""}
  </div>`;
}

function passesBase(p){
  if(p.city!==state.city)return false;
  const cat=catOf(p);
  if(!state.cats.has(cat))return false;
  if(state.halalOnly&&FOOD_CATS.has(cat)&&!isHalalish(p))return false;
  return true;
}
function matchesSearch(p){
  if(!state.q)return true;
  const q=t2s(state.q.toLowerCase());
  const hay=t2s([p.name,p.area,p.address,p.cuisine,p.brand,p.reason,...(p.dishes||[]),...(p.activities||[])].join(" ").toLowerCase());
  if(!hay.includes(q))return false;
  return true;
}
function passes(p){return passesBase(p)&&matchesSearch(p);}

// hover 清單卡片時，對應地圖圖釘放大高亮＋置頂
function highlightMarker(pid,on){
  const mk=markers.find(m=>m._pid===pid);
  if(!mk||!mk._icon)return;
  mk._icon.classList.toggle('pin-hl',on);
  mk.setZIndexOffset(on?1300:(mk._z||0));
}
// 依「目前地圖中心」由近到遠排序（無座標者殿後）
function sortByCenter(items){
  const c=map.getCenter();
  return items.slice().sort((a,b)=>{
    const da=(a.lat&&a.lng)?c.distanceTo([a.lat,a.lng]):Infinity;
    const db=(b.lat&&b.lng)?c.distanceTo([b.lat,b.lng]):Infinity;
    return da-db;
  });
}
function buildList(items){
  const list=document.getElementById('list');list.innerHTML="";
  items.forEach(p=>{
    const cat=catOf(p);
    const card=document.createElement('div');card.className='card';
    const hl=halalLabel(p);
    const badgeCfg=iconFor(cat,p);
    const label=(CATS[cat]||{label:cat}).label;
    card.innerHTML=`<div class="top"><span class="badge" style="background:${badgeCfg.color}">${badgeCfg.emoji||""} ${label}</span><h3>${p.name}</h3>${hl?`<span class="halal-tag">${hl}</span>`:""}</div>
      <div class="meta">${p.rating?"⭐ "+p.rating+"｜":""}${p.area||""}${p.brand?"｜"+p.brand:""}${p.hours?"｜"+p.hours:""}${p.price?"｜"+p.price:""}${p.ticket?"｜門票 "+p.ticket:""}</div>
      ${(p.dishes||p.activities)?`<div class="dishes">${(p.dishes||p.activities).slice(0,4).join("、")}</div>`:""}`;
    card.onclick=()=>{
      if(p.lat&&p.lng){focusOn([p.lat,p.lng],15);
        const mk=markers.find(m=>m._pid===p._id);if(mk)mk.openPopup();}
    };
    if(p.lat&&p.lng){
      card.onmouseenter=()=>{card.classList.add('active');highlightMarker(p._id,true);};
      card.onmouseleave=()=>{card.classList.remove('active');highlightMarker(p._id,false);};
    }
    list.appendChild(card);
  });
}
function render(){
  markers.forEach(m=>map.removeLayer(m));markers=[];
  if(routeLine){map.removeLayer(routeLine);routeLine=null;}
  const mapItems=PLACES.filter(passesBase);
  const items=mapItems.filter(matchesSearch);
  document.getElementById('count').textContent=`顯示 ${items.length} 個地點（${state.city==="重庆"?"重慶":state.city}）`;
  const popW=Math.min(300,window.innerWidth-90);
  mapItems.forEach(p=>{
    const cat=catOf(p);
    if(p.lat&&p.lng){
      const z=matchesSearch(p)?100:0;
      const mk=L.marker([p.lat,p.lng],{icon:makeIcon(cat,p,!!state.q&&!matchesSearch(p)),zIndexOffset:z})
        .addTo(map).bindPopup(popupHtml(p),{maxWidth:popW});
      mk._pid=p._id;mk._z=z;markers.push(mk);
    }
  });
  buildList(sortByCenter(items));
}
// 平移／縮放結束後，清單依新的地圖中心重新由近到遠排序（僅地點模式，行程模式不動）
map.on('moveend',()=>{

// ---------- 📅 行程模式 ----------
function _norm(s){return t2s((s||"").replace(/[（(].*?[)）]/g,"").replace(/[·・\s]/g,"").toLowerCase());}
const _PIDX=PLACES.map(p=>[_norm(p.name),p]);
function findPlace(name){
  const n=_norm(name);if(!n)return null;
  let best=null,bestLen=0;
  for(const [pn,p] of _PIDX){
    if(pn===n)return p;
    if((pn.includes(n)||n.includes(pn))&&pn.length>bestLen){best=p;bestLen=pn.length;}
  }
  return best;
}
function focusTripPlace(name){
  const p=findPlace(name);
  if(!p||!p.lat||!p.lng)return;
  focusOn([p.lat,p.lng],15);
  let mk=markers.find(m=>m._pid===p._id);
  if(!mk){
    const cat=catOf(p);
    mk=L.marker([p.lat,p.lng],{icon:makeIcon(cat,p,false),zIndexOffset:1200})
      .addTo(map).bindPopup(popupHtml(p),{maxWidth:Math.min(300,window.innerWidth-90)});
    mk._pid=p._id;markers.push(mk);
  }
  mk.openPopup();
}
document.getElementById('list').addEventListener('click',e=>{
  const link=e.target.closest('a[data-focus-place]');
  if(!link)return;
  e.preventDefault();

},true);
const KIND_COLOR={spot:"#c0392b",meal:"#1a7a6d",hotel:"#37474f",move:"#5d4037"};
function numIcon(n,kind){

    iconSize:[30,30],iconAnchor:[15,30],popupAnchor:[0,-30]});
}
function renderTrip(keepView){
  markers.forEach(m=>map.removeLayer(m));markers=[];
  if(routeLine){map.removeLayer(routeLine);routeLine=null;}
  const list=document.getElementById('list');list.innerHTML="";
  const day=TRIP.find(x=>x.d===state.tripDay)||TRIP[0];
  // 日期選擇 chips
  const chipRow=document.createElement('div');chipRow.className='trip-controls';
  chipRow.style.cssText='display:flex;flex-wrap:wrap;gap:5px;padding:6px 4px 10px';
  TRIP.forEach(dd=>{
    const c=document.createElement('span');c.className='chip'+(dd.d===day.d?' on':'');
    c.textContent=`D${dd.d} ${dd.date}`;
    if(dd.d===day.d){c.style.background='#c0392b';c.style.color='#fff';}
    c.onclick=()=>{state.tripDay=dd.d;renderTrip();};
    chipRow.appendChild(c);
  });
  // 顯示全部地點開關（疊加背景小圖釘，尊重上方分類/清真/搜尋篩選）
  const allChip=document.createElement('span');
  allChip.className='chip'+(state.tripShowAll?' on':'');
  allChip.textContent='🗺 顯示全部地點（可搭配上方篩選）';
  if(state.tripShowAll){allChip.style.background='#1a7a6d';allChip.style.color='#fff';}
  allChip.onclick=()=>{state.tripShowAll=!state.tripShowAll;renderTrip(true);};// 切換疊加時保留目前視角，不重新取景
  chipRow.appendChild(allChip);
  list.appendChild(chipRow);
  const head=document.createElement('div');
  head.style.cssText='font-size:13.5px;font-weight:700;padding:0 4px 8px';
  head.textContent=`Day ${day.d}（${day.wd}）${day.city==='重庆'?'重慶':day.city}：${day.title}`;
  list.appendChild(head);
  // 背景疊加全部地點（半透明小圖釘）
  let bgCount=0;
  if(state.tripShowAll){
    const dayCities=day.city==='双城'?['重庆','成都']:[day.city];
    const stopNames=new Set(day.stops.map(s=>t2s(s.name)));
    const q=t2s(state.q.toLowerCase());
    PLACES.forEach(p=>{
      if(!p.lat||!dayCities.includes(p.city))return;
      const cat=catOf(p);
      if(!state.cats.has(cat))return;
      if(state.halalOnly&&FOOD_CATS.has(cat)&&!isHalalish(p))return;
      let searchMatch=true;
      if(q){const hay=t2s([p.name,p.area,p.address,p.cuisine,...(p.dishes||[]),...(p.activities||[])].join(" ").toLowerCase());searchMatch=hay.includes(q);}
      if(stopNames.has(t2s(p.name)))return;
      const cfg=iconFor(cat,p);
      const mk=L.marker([p.lat,p.lng],{icon:L.divIcon({className:'pin-wrap',
        html:`<div class="pin" style="background:${cfg.color};transform:rotate(-45deg) scale(.72);opacity:${searchMatch?'.62':'.16'}"><span>${cfg.emoji}</span></div>`,
        iconSize:[30,30],iconAnchor:[15,30],popupAnchor:[0,-26]}),zIndexOffset:0})
        .addTo(map).bindPopup(popupHtml(p),{maxWidth:Math.min(300,window.innerWidth-90)});
      mk._pid=p._id;markers.push(mk);bgCount++;
    });
  }
  const bgHint=state.tripShowAll?(bgCount>0?`（＋背景 ${bgCount} 個地點）`:`（背景 0 個——受上方分類/清真/搜尋篩選影響，按「全選」可顯示全部類型）`):"";
  document.getElementById('count').textContent=`📅 12月${day.date.split('/')[1]}日 ｜ ${day.stops.length} 站${bgHint}`;
  // 路線與標記
  const pts=[];
  day.stops.forEach((s,i)=>{
    const p=findPlace(s.name);
    if(p&&p.lat&&p.lng){
      pts.push([p.lat,p.lng]);
      const mk=L.marker([p.lat,p.lng],{icon:numIcon(i+1,s.kind),zIndexOffset:1000+i})
        .addTo(map)
        .bindPopup(`<div class="pp"><div class="sub" style="margin-bottom:4px">${s.t}｜${s.label}</div>`+popupHtml(p).replace('<div class="pp">','')+`</div>`,{maxWidth:Math.min(300,window.innerWidth-90)});
      mk._stopIdx=i;markers.push(mk);
    }
    const card=document.createElement('div');card.className='card';
    const isPlaceStop=(s.kind==='spot'||s.kind==='hotel');
    const nb=(p&&isPlaceStop)?nearbyText(p):"";
    const eats=(p&&isPlaceStop)?nearbyEats(p):"";
    card.innerHTML=`<div class="top"><span class="badge" style="background:${KIND_COLOR[s.kind]||'#555'}">${i+1}</span><h3>${s.name}</h3></div>
      <div class="meta">🕐 ${s.t}｜${s.label}</div>
      ${s.note?`<div class="dishes">${s.note}</div>`:""}
      ${s.kind==='meal'?(function(){const h=altHTML(s);return h?`<div class="meta" style="margin-top:4px;color:#a04b12">${h}</div>`:"";})():""}
      ${eats?`<div class="meta" style="margin-top:4px;color:#0e7c3f">🍽 附近用餐：${eats}</div>`:""}
      ${nb?`<div class="meta" style="margin-top:4px">🧭 附近：${nb}</div>`:""}
      ${(s.go&&i<day.stops.length-1)?`<div class="meta" style="margin-top:4px;color:#4a6b8a">↓ ${s.go}</div>`:""}`;
    card.onclick=()=>{
      const mk=markers.find(m=>m._stopIdx===i);
      if(mk){focusOn(mk.getLatLng(),15);mk.openPopup();}
    };
    list.appendChild(card);
  });
  if(pts.length>1){
    routeLine=L.polyline(pts,{color:'#c0392b',weight:3,opacity:.75,dashArray:'8 6'}).addTo(map);
    if(!keepView)map.fitBounds(routeLine.getBounds(),fitPad());
  }else if(pts.length===1&&!keepView){focusOn(pts[0],13);}
}

// ---------- 📡 定位：顯示目前位置 ----------
// 瀏覽器定位回傳 WGS-84；高德圖磚為 GCJ-02——中國境內必須轉換，否則偏移數百米。
(function(){
  function outOfChina(lat,lng){
    if(lng>119.3&&lng<124.5&&lat>21.5&&lat<25.5)return true; // 台灣用 WGS-84，不做 GCJ 偏移
    return lng<72.004||lng>137.8347||lat<0.8293||lat>55.8271;
  }
  function tLat(x,y){let r=-100+2*x+3*y+0.2*y*y+0.1*x*y+0.2*Math.sqrt(Math.abs(x));
    r+=(20*Math.sin(6*x*Math.PI)+20*Math.sin(2*x*Math.PI))*2/3;
    r+=(20*Math.sin(y*Math.PI)+40*Math.sin(y/3*Math.PI))*2/3;
    r+=(160*Math.sin(y/12*Math.PI)+320*Math.sin(y*Math.PI/30))*2/3;return r;}
  function tLng(x,y){let r=300+x+2*y+0.1*x*x+0.1*x*y+0.1*Math.sqrt(Math.abs(x));
    r+=(20*Math.sin(6*x*Math.PI)+20*Math.sin(2*x*Math.PI))*2/3;
    r+=(20*Math.sin(x*Math.PI)+40*Math.sin(x/3*Math.PI))*2/3;
    r+=(150*Math.sin(x/12*Math.PI)+300*Math.sin(x/30*Math.PI))*2/3;return r;}
  window.wgs2gcj=function(lat,lng){
    if(outOfChina(lat,lng))return[lat,lng];
    const a=6378245,ee=0.00669342162296594323;
    let dLat=tLat(lng-105,lat-35),dLng=tLng(lng-105,lat-35);
    const radLat=lat/180*Math.PI;
    let magic=Math.sin(radLat);magic=1-ee*magic*magic;
    const sqrtMagic=Math.sqrt(magic);
    dLat=(dLat*180)/((a*(1-ee))/(magic*sqrtMagic)*Math.PI);
    dLng=(dLng*180)/(a/sqrtMagic*Math.cos(radLat)*Math.PI);
    return[lat+dLat,lng+dLng];
  };

  let watchId=null,meMarker=null,meCircle=null,firstFix=true;
  const LocCtl=L.Control.extend({
    options:{position:'topleft'},
    onAdd(){
      const d=L.DomUtil.create('div','loc-btn');
      d.id='locBtn';d.title='顯示目前位置';d.textContent='🎯';
      L.DomEvent.disableClickPropagation(d);
      d.onclick=toggleLocate;
      return d;
    }
  });
  map.addControl(new LocCtl());
  function setBtn(state){ // ''|'active'|'err'
    const b=document.getElementById('locBtn');
    b.className='loc-btn'+(state?' '+state:'');
  }
  function onPos(pos){
    const [lat,lng]=wgs2gcj(pos.coords.latitude,pos.coords.longitude);
    const acc=Math.min(pos.coords.accuracy||50,500);
    if(!meMarker){
      meMarker=L.marker([lat,lng],{icon:L.divIcon({className:'',html:'<div class="me-dot"></div>',iconSize:[16,16],iconAnchor:[8,8]}),zIndexOffset:2000,interactive:false}).addTo(map);
      meCircle=L.circle([lat,lng],{radius:acc,color:'#1976d2',weight:1,fillColor:'#1976d2',fillOpacity:.12,interactive:false}).addTo(map);
    }else{
      meMarker.setLatLng([lat,lng]);
      meCircle.setLatLng([lat,lng]).setRadius(acc);
    }
    if(firstFix){firstFix=false;focusOn([lat,lng],16);}
    setBtn('active');
  }
  function onErr(e){
    stopLocate();setBtn('err');
    const msg=e.code===1?'定位權限被拒絕——請在瀏覽器設定允許本網站取得位置':
             (e.code===2?'目前無法取得位置（GPS 訊號弱或未開啟）':'定位逾時，請再試一次');
    alert('📡 '+msg);
    setTimeout(()=>setBtn(''),1500);
  }
  function stopLocate(){
    if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null;}
    if(meMarker){map.removeLayer(meMarker);meMarker=null;}
    if(meCircle){map.removeLayer(meCircle);meCircle=null;}
    firstFix=true;setBtn('');
  }
  function toggleLocate(){
    if(watchId!==null){stopLocate();return;}
    if(!navigator.geolocation){alert('此瀏覽器不支援定位');return;}
    setBtn('active');
    watchId=navigator.geolocation.watchPosition(onPos,onErr,{enableHighAccuracy:true,maximumAge:5000,timeout:15000});
  }
})();

// ---------- 手機底部面板：覆蓋式 bottom sheet（translateY 位移） ----------
// 效能設計：面板固定渲染在 88% 高、用 transform:translateY 露出不同比例。
// 拖曳＝純 GPU 合成（零重排）；地圖滿版尺寸固定，完全不需 invalidateSize。
// 高度計算用 window.innerHeight＋常數（不依賴 dvh/getBoundingClientRect，
// 背景分頁下才可靠）。
(function(){
  const sidebar=document.getElementById('sidebar');
  const handle=document.getElementById('sheetHandle');
  const TOPNAV_H=44; // 與手機版 .topnav 高度一致
  const isMobile=()=>window.matchMedia('(max-width:760px)').matches;
  const PEEK=132; // 收合時露出：把手＋標題＋城市頁籤
  let mode='half'; // 'peek' | 'half' | 'full'
  let curShown=0;  // 目前露出的像素（供 fitBounds 底部留白）
  function appH(){return Math.max(320,window.innerHeight-TOPNAV_H);}
  function sheetH(){return Math.round(appH()*0.88);}
  function shownFor(m){
    if(m==='peek')return PEEK;
    if(m==='full')return sheetH();
    return Math.round(appH()*0.44);
  }
  function setShown(px,animate){
    curShown=px;
    sidebar.classList.toggle('dragging',!animate);
    sidebar.style.transform=`translateY(${sheetH()-px}px)`;
  }
  window.sheetVisiblePx=()=>isMobile()?curShown:0; // 給 fitBounds 用
  function applyMode(m,animate){mode=m;setShown(shownFor(m),animate);}
  function setInitial(){
    if(window.innerWidth<10)return; // 分頁在背景時 innerWidth 可能為 0，跳過以免誤判裝置
    if(!isMobile()){sidebar.style.transform='';sidebar.style.height='';curShown=0;return;}
    sidebar.style.height=sheetH()+'px';
    applyMode('half',false);
    try{map.invalidateSize();}catch(e){} // 佈局初始化時做一次即可
  }
  setInitial();
  requestAnimationFrame(setInitial); // 首幀後再校正一次（載入瞬間尺寸未定時）
  window.addEventListener('resize',setInitial);
  window.addEventListener('orientationchange',setInitial);

  // ── 手勢：整個面板皆可拖（Google Maps 式）──
  // 規則：把手＝無條件拖面板；面板其他區域＝智慧判斷——
  //   往下滑且清單已在頂部 → 拖面板（收合）
  //   往上滑且面板未全開   → 拖面板（展開）；全開後上滑交還給清單捲動
  // 判定前 8px 為緩衝（不干擾點擊）；水平為主的滑動不接管（保留篩選列橫滑）。
  const listEl=document.getElementById('list');
  let drag=null; // {startY,startX,startShown,taking,decided,fromHandle,moved,startT}
  function snap(){
    const cands={peek:shownFor('peek'),half:shownFor('half'),full:shownFor('full')};
    let best='half',bestD=Infinity;
    Object.entries(cands).forEach(([k,v])=>{const d=Math.abs(curShown-v);if(d<bestD){bestD=d;best=k;}});
    applyMode(best,true);
  }
  function gStart(y,x,fromHandle){
    if(!isMobile())return;
    drag={startY:y,startX:x,startShown:curShown||shownFor(mode),
          taking:fromHandle,decided:fromHandle,fromHandle,moved:0,startT:Date.now()};
    if(fromHandle)sidebar.classList.add('dragging');
  }
  function gMove(y,x,e){
    if(!drag)return;
    const dy=drag.startY-y; // 正值＝往上
    const dx=Math.abs(drag.startX-x);
    drag.moved=Math.max(drag.moved,Math.abs(dy));
    if(!drag.decided){
      if(Math.abs(dy)<8&&dx<8)return;           // 緩衝區
      if(dx>Math.abs(dy)){drag=null;return;}    // 橫向為主 → 交給橫滑列
      const atFull=curShown>=sheetH()-4;
      drag.taking = dy<0 ? (listEl.scrollTop<=0)   // 下滑：清單在頂才接管
                         : !atFull;                 // 上滑：未全開才接管
      drag.decided=true;
      if(!drag.taking){drag=null;return;}          // 交還原生捲動
      sidebar.classList.add('dragging');
    }
    if(drag.taking){
      if(e&&e.cancelable)e.preventDefault();       // 阻止清單捲動/瀏覽器手勢搶走
      setShown(Math.min(sheetH(),Math.max(PEEK,drag.startShown+dy)),false);
    }
  }
  function gEnd(){
    if(!drag)return;
    const d=drag;drag=null;
    sidebar.classList.remove('dragging');
    if(!d.taking)return;
    const isTap=d.fromHandle&&d.moved<6&&(Date.now()-d.startT)<300;
    if(isTap){applyMode(mode==='peek'?'half':'peek',true);return;}
    snap();
  }
  sidebar.addEventListener('touchstart',e=>{
    if(e.target.closest('input'))return;           // 搜尋框不攔
    gStart(e.touches[0].clientY,e.touches[0].clientX,!!e.target.closest('.sheet-handle'));
  },{passive:true});
  sidebar.addEventListener('touchmove',e=>gMove(e.touches[0].clientY,e.touches[0].clientX,e),{passive:false});
  sidebar.addEventListener('touchend',gEnd);
  sidebar.addEventListener('touchcancel',gEnd);    // 瀏覽器手勢中斷也要收尾，否則卡死
  handle.addEventListener('mousedown',e=>{gStart(e.clientY,e.clientX,true);e.preventDefault();});
  window.addEventListener('mousemove',e=>gMove(e.clientY,e.clientX,e));
  window.addEventListener('mouseup',gEnd);
})();
</script>
<script>
/* 離線：註冊 Service Worker ＋ 一鍵預載目前地圖範圍的高德圖磚 */
(function(){
  if('serviceWorker' in navigator){
    window.addEventListener('load',function(){
      navigator.serviceWorker.register('sw.js').then(function(){return navigator.serviceWorker.ready;}).then(function(){
        if(!('caches' in window))return;
        caches.open('sichuan-app-v1').then(function(c){
          document.querySelectorAll('script[src],link[href]').forEach(function(el){
            var u=el.src||el.href; if(!u||u.indexOf(location.origin)!==0)return;
            c.match(u).then(function(hit){ if(!hit) fetch(u).catch(function(){}); });
          });
        });
      }).catch(function(){});
    });
  }
  var btn=document.getElementById('offlineBtn');
  if(!btn)return;
  if(!('caches' in window)){ btn.disabled=true; btn.textContent='離線預載需用 https 網址開啟'; return; }
  function lon2tile(lon,z){return Math.floor((lon+180)/360*Math.pow(2,z));}
  function lat2tile(lat,z){var r=lat*Math.PI/180;return Math.floor((1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*Math.pow(2,z));}
  function tileUrl(x,y,z){var s=['1','2','3','4'][Math.abs(x+y)%4];return 'https://webrd0'+s+'.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x='+x+'&y='+y+'&z='+z;}
  var busy=false, orig=btn.textContent;
  btn.onclick=async function(){
    if(busy)return;
    var b=map.getBounds(), z0=Math.max(11,Math.round(map.getZoom())), zMax=Math.min(16,z0+2);
    var urls=[];
    for(var z=z0; z<=zMax; z++){
      var xa=lon2tile(b.getWest(),z), xb=lon2tile(b.getEast(),z);
      var ya=lat2tile(b.getNorth(),z), yb=lat2tile(b.getSouth(),z);
      for(var x=Math.min(xa,xb); x<=Math.max(xa,xb); x++)
        for(var y=Math.min(ya,yb); y<=Math.max(ya,yb); y++)
          urls.push(tileUrl(x,y,z));
    }
    if(!urls.length)return;
    if(urls.length>3000){ alert('此範圍圖磚太多（約 '+urls.length+' 張），請先放大地圖縮小範圍再預載。'); return; }
    busy=true; btn.disabled=true;
    var total=urls.length, done=0, fail=0, i=0;
    var cache=await caches.open('sichuan-tiles-v1');
    async function worker(){
      while(i<urls.length){
        var u=urls[i++];
        try{ var res=await fetch(u,{mode:'no-cors'}); await cache.put(u,res); }
        catch(e){ fail++; }
        done++;
        if(done%15===0||done===total) btn.textContent='預載中… '+done+'/'+total;
      }
    }
    await Promise.all([worker(),worker(),worker(),worker(),worker(),worker()]);
    btn.textContent='✅ 已預載 '+(total-fail)+'/'+total+' 張'+(fail?'（'+fail+' 張失敗）':'');
    setTimeout(function(){ btn.textContent=orig; btn.disabled=false; busy=false; },5000);
  };
})();
</script>
