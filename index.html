<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sichuan Trip</title>
<style>
:root{
  --bg:#faf7f2;
  --panel:#ffffff;
  --ink:#2b2620;
  --muted:#7b7168;
  --accent:#c0392b;
  --accent2:#1a7a6d;
  --line:#e8e1d6;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  display:grid;
  place-items:center;
  background:var(--bg);
  color:var(--ink);
  font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
}
main{
  width:min(720px, calc(100% - 32px));
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:8px;
  padding:28px;
}
h1{margin:0 0 8px;font-size:28px}
p{margin:0 0 22px;color:var(--muted);line-height:1.7}
.links{display:flex;gap:12px;flex-wrap:wrap}
a{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:44px;
  padding:0 18px;
  border-radius:8px;
  text-decoration:none;
  font-weight:700;
  color:#fff;
  background:var(--accent);
}
a.secondary{background:var(--accent2)}
@media (max-width:520px){
  main{padding:22px}
  h1{font-size:23px}
  a{width:100%}
}
</style>
</head>
<body>
<main>
  <h1>Sichuan Trip</h1>
  <p>Open the itinerary or the interactive map.</p>
  <div class="links">
    <a href="itinerary.html">Itinerary</a>
    <a class="secondary" href="map.html">Map</a>
  </div>
</main>
</body>
</html>
