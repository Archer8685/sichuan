<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sichuan Trip</title>
<style>
:root{
  --bg:#faf7f2;
  --panel:#ffffff;
  --ink:#2b2620;
  --muted:#7b7168;
  --accent:#c0392b;
  --accent2:#1a7a6d;
  --line:#e8e1d6;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
}
.topnav{
  position:sticky;
  top:0;
  z-index:20;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  min-height:58px;
  padding:9px clamp(14px, 3vw, 28px);
  background:rgba(250,247,242,.96);
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(12px);
}
.brand{
  display:flex;
  flex-direction:column;
  min-width:0;
}
.brand strong{
  font-size:15px;
  line-height:1.25;
}
.brand span{
  color:var(--muted);
  font-size:12px;
  line-height:1.35;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.navlinks{
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}
.navlinks a{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:38px;
  padding:0 14px;
  border:1px solid var(--line);
  border-radius:8px;
  color:var(--ink);
  background:var(--panel);
  text-decoration:none;
  font-size:14px;
  font-weight:700;
}
.navlinks a[aria-current="page"]{
  color:#fff;
  background:var(--accent);
  border-color:var(--accent);
}
.navlinks a.map[aria-current="page"]{
  color:#fff;
  background:var(--accent2);
  border-color:var(--accent2);
}
.content-frame{
  display:block;
  width:100%;
  height:calc(100dvh - 58px);
  border:0;
  background:var(--bg);
}
@media (max-width:520px){
  .topnav{
    min-height:62px;
    padding:8px 12px;
  }
  .brand strong{font-size:14px}
  .brand span{font-size:11.5px}
  .navlinks a{
    min-height:40px;
    padding:0 12px;
    font-size:13px;
  }
  .content-frame{height:calc(100dvh - 62px)}
}
</style>
</head>
<body>
<nav class="topnav" aria-label="主要導覽">
  <div class="brand">
    <strong>Sichuan Trip</strong>
    <span>2026/12/5 - 12/13</span>
  </div>
  <div class="navlinks">
    <a href="index.html" aria-current="page">行程</a>
    <a class="map" href="map.html">地圖</a>
  </div>
</nav>
<iframe class="content-frame" src="itinerary.html" title="Sichuan Trip itinerary"></iframe>
</body>
</html>
